bio: >
  Hjh Rafidah binti Hj Zainal Abidin bersama-sama memeriksa dan mengesahkan
  penyata kewangan tahunan pertubuhan. Pengalaman beliau dalam pemeriksaan
  kewangan membantu memastikan setiap transaksi direkod dengan betul dan
  menepati peraturan yang diguna pakai.
