bio: >
  Dora binti Ahmad ialah Presiden PESUMA yang memimpin hala tuju dan visi
  pertubuhan. Dengan pengalaman luas dalam profesion, beliau komited untuk
  memperkukuh jaringan komuniti Pesuruhjaya Sumpah dan memartabatkan integriti
  perkhidmatan. Di bawah kepimpinannya, PESUMA memasuki fasa baharu yang
  lebih progresif dan inklusif.
email: president@pesuma.com.my
quote: Integriti bukan pilihan, ia adalah asas setiap amanah yang dipikul.
