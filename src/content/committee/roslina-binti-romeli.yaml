bio: >
  Roslina binti Romeli menguruskan kewangan pertubuhan dengan telus dan
  sistematik. Sebagai Bendahari, beliau bertanggungjawab terhadap perancangan
  kewangan, penyediaan laporan berkala dan memastikan setiap perbelanjaan
  menepati keperluan serta peraturan yang ditetapkan.
quote: Amanah wang adalah amanah jiwa — setiap sen perlu dipertanggungjawab.
