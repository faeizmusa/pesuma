bio: >
  Dato Seri Pua Chee Wei memangku tanggungjawab sebagai Naib Presiden,
  membantu Presiden dalam melaksanakan agenda pertubuhan dan menyelaras
  inisiatif lintas-biro. Dengan latar belakang profesional yang luas, beliau
  membawa perspektif strategik dalam memperkukuh hubungan PESUMA dengan
  pelbagai pihak berkepentingan.
quote: Kepimpinan yang berintegriti lahir daripada kerjasama, bukan kuasa.
