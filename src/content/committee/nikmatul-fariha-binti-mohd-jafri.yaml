bio: >
  Nikmatul Fariha binti Mohd Jafri membantu Bendahari dalam pengurusan kewangan
  harian, penyediaan laporan dan urusan pembayaran. Dengan latar belakang dalam
  pengurusan kewangan, beliau menyumbang kepada ketelusan dan akauntabiliti
  kewangan pertubuhan.
quote: Ketelitian dalam kewangan adalah cermin kejujuran seseorang.
