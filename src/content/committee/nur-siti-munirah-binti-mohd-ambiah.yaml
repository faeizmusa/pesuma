bio: >
  Nur Siti Munirah binti Mohd Ambiah menguruskan pentadbiran dan dokumentasi
  rasmi PESUMA. Sebagai Setiausaha Agung, beliau memastikan setiap urusan
  pertubuhan berjalan mengikut perlembagaan dan merekodkan keputusan penting
  dengan teliti. Komitmennya terhadap ketelusan menjadikan sekretariat lebih
  efisien dan profesional.
